name: Headless Tests & Screenshots

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: Da25KUVSE5jbGds2zXmfXw==

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build debug APK
        run: ./gradlew assembleLawnWithQuickstepGithubDebug

      - name: Boot emulator, install APK, and capture screenshots
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            set -e
            mkdir -p screenshots

            # Install the Lawnchair debug APK
            APK=$(find build/outputs/apk -name "*.apk" | head -1)
            echo "Installing $APK"
            adb install -r "$APK"

            # Set Lawnchair as the default home app
            adb shell cmd package set-home-activity app.lawnchair.debug/app.lawnchair.LawnchairLauncher || true

            # Home screen
            adb shell input keyevent KEYCODE_HOME
            sleep 3
            adb shell screencap -p /sdcard/screenshot_home.png
            adb pull /sdcard/screenshot_home.png screenshots/

            # App drawer — swipe up from bottom of screen
            adb shell input swipe 540 1800 540 400 600
            sleep 2
            adb shell screencap -p /sdcard/screenshot_app_drawer.png
            adb pull /sdcard/screenshot_app_drawer.png screenshots/

            # Recents / Overview
            adb shell input keyevent KEYCODE_APP_SWITCH
            sleep 2
            adb shell screencap -p /sdcard/screenshot_recents.png
            adb pull /sdcard/screenshot_recents.png screenshots/

            # Back to home
            adb shell input keyevent KEYCODE_HOME

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: screenshots-${{ github.sha }}
          path: screenshots/
          retention-days: 14
